image:
  repository: ghcr.io/nimishgj/aws-radar
  tag: "0.4.0"
  pullPolicy: IfNotPresent

common:
  server:
    port: 9090
    metricsPath: /metrics
    healthPath: /health

  collection:
    interval: 60s
    timeout: 30s

  costExplorer:
    enabled: false
    frequency: daily # hourly | daily | weekly | monthly

  costCUR:
    enabled: false
    bucket: ""
    prefix: ""
    reportName: ""
    format: ""           # auto-detect from manifest; "parquet" or "csv"
    frequency: daily     # hourly | daily
    region: us-east-1
    maxResources: 100

  collectors:
    - apigateway
    - apigatewayv2
    - autoscaling
    - athena
    - configservice
    - mq
    - ses
    - cloudformation
    - documentdb
    - neptune
    - memorydb
    - timestream
    - fsx
    - backup
    - kinesis
    - firehose
    - kinesisanalytics
    - emr
    - elasticbeanstalk
    - kms
    - cloudtrail
    - kinesisvideo
    - opensearchserverless
    - s3control
    - batch
    - codebuild
    - codepipeline
    - codedeploy
    - ecr
    - ec2
    - efs
    - eventbridge
    - glue
    - apprunner
    - transfer
    - msk
    - redshift
    - s3
    - rds
    - lambda
    - ecs
    - elb
    - eks
    - dynamodb
    - elasticache
    - opensearch
    - guardduty
    - securityhub
    - inspector2
    - macie
    - waf
    - secretsmanager
    - sfn
    - ssm
    - sqs
    - sns
    - ebs
    - vpc
    - acm
    - cloudfront
    - route53
    - route53resolver
    - iam
    - shield
    - ecrpublic
    - directconnect
    - organizations
    - controltower
    - bedrock
    - sagemaker
    - quicksight
    - workspaces
    - appstream
    - connect
    - amplify
    - globalaccelerator
    - datasync
    - dms
    - cognito
    - networkfirewall
    - fms
    - acmpca
    - servicecatalog
    - licensemanager

  logging:
    level: info
    format: json

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  healthCheck:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10

  service:
    type: ClusterIP
    port: 9090

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Each instance gets its own Deployment, Service, ConfigMap, and Secret.
# Instance-level fields override common defaults.
instances:
  - name: default
    awsAccountName: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
    aws:
      regions:
        - us-east-1
    # Override any common field per instance:
    # collectors: [ec2, s3, lambda]
    # collection:
    #   interval: 120s
    # costExplorer:
    #   enabled: true
    #   frequency: hourly
    # resources:
    #   limits:
    #     memory: "512Mi"
