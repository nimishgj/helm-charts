image:
  repository: ghcr.io/nimishgj/aws-radar
  tag: "0.2.0"
  pullPolicy: IfNotPresent

common:
  server:
    port: 9090
    metricsPath: /metrics
    healthPath: /health

  collection:
    interval: 60s
    timeout: 30s

  costExplorer:
    enabled: false
    frequency: daily # hourly | daily | weekly | monthly

  collectors:
    - apigateway
    - apigatewayv2
    - autoscaling
    - athena
    - ecr
    - ec2
    - efs
    - eventbridge
    - glue
    - s3
    - rds
    - lambda
    - ecs
    - elb
    - eks
    - dynamodb
    - elasticache
    - opensearch
    - secretsmanager
    - sfn
    - ssm
    - sqs
    - sns
    - ebs
    - vpc
    - acm
    - cloudfront
    - route53
    - iam

  logging:
    level: info
    format: json

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  healthCheck:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10

  service:
    type: ClusterIP
    port: 9090

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Each instance gets its own Deployment, Service, ConfigMap, and Secret.
# Instance-level fields override common defaults.
instances:
  - name: default
    awsAccountName: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
    aws:
      regions:
        - us-east-1
    # Override any common field per instance:
    # collectors: [ec2, s3, lambda]
    # collection:
    #   interval: 120s
    # costExplorer:
    #   enabled: true
    #   frequency: hourly
    # resources:
    #   limits:
    #     memory: "512Mi"
