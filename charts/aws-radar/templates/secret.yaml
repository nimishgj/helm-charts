{{- range $instance := .Values.instances }}
{{- if not (and $instance.secrets $instance.secrets.awsCredentials $instance.secrets.awsCredentials.secretName) }}
{{- $ctx := dict "root" $ "instance" $instance }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aws-radar.instanceName" $ctx }}
  labels:
    {{- include "aws-radar.labels" $ctx | nindent 4 }}
type: Opaque
data:
  AWS_ACCESS_KEY_ID: {{ $instance.awsAccessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ $instance.awsSecretAccessKey | b64enc | quote }}
{{- end }}
{{- end }}
