# Global settings
global:
  # Container registry settings
  imageRegistry: ghcr.io
  imageRepository: nimishgj
  imageTag: latest
  imagePullPolicy: IfNotPresent

  # Common labels applied to all resources
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: hello-frameworks

  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000

# Framework-specific configurations
goGin:
  enabled: false
  image:
    name: hello-gin
    port: 8080
    targetPort: 8080
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  healthCheck:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    type: ClusterIP
    port: 80

javaSpringboot:
  enabled: false
  image:
    name: hello-springboot
    port: 8080
    targetPort: 8080
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  healthCheck:
    path: /health
    port: 8080
    initialDelaySeconds: 300
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    type: ClusterIP
    port: 80

nodejsExpress:
  enabled: false
  image:
    name: hello-express
    port: 8080
    targetPort: 8080
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  healthCheck:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    type: ClusterIP
    port: 80

pythonFastapi:
  enabled: false
  image:
    name: hello-fastapi
    port: 8080
    targetPort: 8080
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  healthCheck:
    path: /health
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    type: ClusterIP
    port: 80

phpLaravel:
  enabled: false
  image:
    name: hello-laravel
    port: 80
    targetPort: 80
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  healthCheck:
    path: /api/health
    port: 80
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    type: ClusterIP
    port: 80

# Load generator configuration
loadGenerator:
  enabled: false
  image:
    repository: curlimages/curl
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  
  # Load generation configuration
  config:
    # Duration to run the load test (0 means run indefinitely)
    duration: "300s"
    # Requests per second per target
    rps: 10
    # Concurrent connections per target
    concurrency: 5
    # Endpoints to target (will target all enabled frameworks)
    endpoints:
      - "/api/health"
      - "/api/users"
    # HTTP method for requests
    method: "GET"
    # Request timeout
    timeout: "30s"
    # Delay between batches of requests
    delay: "1s"
  
  # Target frameworks (auto-detected from enabled frameworks if empty)
  targets: []
  
  # Resource configuration
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "50m"
  
  # Pod configuration
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  # Restart policy
  restartPolicy: Always

# Common configuration that can be overridden per framework
common:
  # Pod annotations
  podAnnotations: {}

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity rules
  affinity: {}

  # Service account
  serviceAccount:
    create: false
    name: ""