# Load testing example - Deploy multiple frameworks with load generator
# This configuration enables multiple frameworks and generates realistic load

global:
  imageRegistry: ghcr.io
  imageRepository: nimishgj
  imageTag: latest
  imagePullPolicy: IfNotPresent

# Enable multiple frameworks for load testing
goGin:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

javaSpringboot:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"

nodejsExpress:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

pythonFastapi:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

phpLaravel:
  enabled: false

# Enable load generator with moderate load
loadGenerator:
  enabled: true
  replicas: 1
  
  config:
    # Run for 10 minutes
    duration: "600s"
    # 20 requests per second per target
    rps: 20
    # 3 concurrent connections per target
    concurrency: 3
    # Test both health and users endpoints
    endpoints:
      - "/api/health"
      - "/api/users"
    method: "GET"
    timeout: "10s"
    delay: "1s"
  
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "50m"