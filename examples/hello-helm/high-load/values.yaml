# High load example - Stress testing with intensive load generation
# This configuration is designed for performance and stress testing

global:
  imageRegistry: ghcr.io
  imageRepository: nimishgj
  imageTag: latest
  imagePullPolicy: IfNotPresent

# Enable all frameworks with higher replicas for stress testing
goGin:
  enabled: true
  replicas: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

javaSpringboot:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

nodejsExpress:
  enabled: true
  replicas: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

pythonFastapi:
  enabled: true
  replicas: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

phpLaravel:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "150m"
    limits:
      memory: "512Mi"
      cpu: "300m"

# Enable aggressive load generator
loadGenerator:
  enabled: true
  replicas: 2
  
  config:
    # Run for 30 minutes
    duration: "1800s"
    # 100 requests per second per target (very high load)
    rps: 100
    # 10 concurrent connections per target
    concurrency: 10
    # Test multiple endpoints
    endpoints:
      - "/api/health"
      - "/api/users"
      - "/api/users/1"
    method: "GET"
    timeout: "5s"
    delay: "0.5s"
  
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"